# Deploys Supabase edge functions automatically when their code changes.
# Requires one repo secret: SUPABASE_ACCESS_TOKEN
name: Deploy Supabase functions
on:
  push:
    branches: [main]
    paths: ['supabase/functions/**']
  workflow_dispatch: {}   # also allows manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: kgsdtfrcyjrxeyqqxoic
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions
        run: |
          set -e
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [ "$fn" = "_shared" ] && continue
            if [ "$fn" = "whatsapp-webhook" ]; then
              echo "== deploying $fn (no-verify-jwt) =="
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt --use-api
            else
              echo "== deploying $fn =="
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --use-api
            fi
          done
